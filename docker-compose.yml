version: "3.8"

services:
  backend:
    build: ./backend
    container_name: nyay-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./faiss_index:/app/../faiss_index
      - ./legal_docs:/app/../legal_docs
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nyay-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: nyay-db
    environment:
      POSTGRES_DB: nyayai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data: